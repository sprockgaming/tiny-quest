name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-changes:
    name: Check for new commits
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if there are commits since last deploy
        id: check
        run: |
          # On push trigger, always deploy
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On schedule, check if there are new commits in the last hour
          LAST_HOUR=$(date -d '1 hour ago' --utc +%Y-%m-%dT%H:%M:%SZ)
          RECENT_COMMITS=$(git log --oneline --after="$LAST_HOUR" HEAD | wc -l)
          if [ "$RECENT_COMMITS" -gt "0" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Found $RECENT_COMMITS new commit(s) in the last hour"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new commits in the last hour, skipping deploy"
          fi

  build-and-deploy:
    name: Build and Deploy
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
